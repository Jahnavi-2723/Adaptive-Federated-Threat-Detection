<!DOCTYPE html>
<html>
<head>

  <style>
    body {
      width: 320px;
      background:#0b1220;
      color:#fff;
      font-family: Arial;
      text-align:center;
      padding:10px;

    .badge {

      border-radius:10px;
      font-size:13px;
    }
  </style>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h3>🔍 Domain Scan</h3>

<p id="domain"></p>

</html>
