<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Explainable AI | Threat Detector</title>

  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

  <style>
    body {
      background-color: #0f1116;
      color: #eee;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    header {
      background: #1f222a;
      padding: 10px;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      color: #4ad9e4;
    }

    nav a {
      color: #4ad9e4;
      margin: 0 10px;
      text-decoration: none;
    }

    input {
      padding: 8px;
      width: 280px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 8px 16px;
      background: #4ad9e4;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .spinner {
      border: 4px solid #1a1d24;
      border-top: 4px solid #4ad9e4;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      margin: auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<header>
  <h1>🧠 Explainable AI — Domain Threat Reasoning</h1>
  <nav>
    <a href="/">Home</a>
    <a href="/explain">Explainability</a>
  </nav>
</header>

<main>

<h2>🔍 Analyze Domain Threat</h2>

<input type="text" id="domain" placeholder="Enter domain">
<button onclick="explain()">Analyze</button>

<div id="loader" style="display:none;margin-top:20px;">
  <div class="spinner"></div>
  <p>Analyzing...</p>
</div>

<div id="resultCard" style="display:none;margin-top:30px;">

  <div id="gauge" style="width:300px;height:250px;margin:auto;"></div>

  <div id="badge" style="
    margin-top:10px;
    font-weight:bold;
    padding:8px 16px;
    border-radius:20px;
    display:inline-block;">
  </div>

  <h2 id="summary"></h2>

  <div id="insight" style="
    margin-top:15px;
    padding:15px;
    background:#16202a;
    border-left:4px solid #4ad9e4;
    max-width:600px;
    margin:auto;
    border-radius:8px;">
  </div>

  <div id="riskFactors" style="margin-top:15px;"></div>

  <div style="margin-top:20px;">
    <b>💡 Explanation</b>
    <p id="llm"></p>
  </div>

</div>

</main>

<script>
async function explain() {
  const domain = document.getElementById('domain').value.trim();
  if (!domain) return alert("Please enter a domain!");

  document.getElementById('loader').style.display = "block";
  document.getElementById('resultCard').style.display = "none";

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain })
    });

    const data = await res.json();
    console.log("EXPLAIN DATA:", data);

    // ✅ SAFE parsing
    const score = Number(data.risk_score ?? 0);
    const label = data.label ?? "UNKNOWN";
    const summary = data.summary ?? "No insights available";
    const llm = data.llm_explanation ?? "";

    document.getElementById('loader').style.display = "none";

    const card = document.getElementById('resultCard');
    card.style.display = "block";

    // ✅ FIXED GAUGE
    Plotly.newPlot("gauge", [{
    type: "indicator",
    mode: "gauge+number",
    value: score,   // ✅ direct use (no animation bug)
    title: { text: "Risk Score" },

  gauge: {
    axis: { range: [0, 100] },
    steps: [
      { range: [0, 40], color: "#1f7a1f" },
      { range: [40, 70], color: "#e6b800" },
      { range: [70, 100], color: "#cc0000" }
    ]
  }
}], {
  paper_bgcolor: "#0f1116",
  font: { color: "#eee" }
});

    document.getElementById('summaryText').innerText =
      `${summary} (${label})`;

    document.getElementById("threatBadge").innerText = label;

    document.getElementById("llmText").innerText =
      llm || "No explanation available.";

  } catch (err) {
    console.error(err);
    alert("⚠️ Something went wrong. Check console.");
    document.getElementById('loader').style.display = "none";
  }
}

// Auto load if redirected
document.addEventListener("DOMContentLoaded", () => {
  try {
    const initial = {{ (initial_domain or "") | tojson }};
    if (initial) {
      document.getElementById("domain").value = initial;
      explain();
    }
  } catch(e) {}
});
</script>

</body>
</html>
