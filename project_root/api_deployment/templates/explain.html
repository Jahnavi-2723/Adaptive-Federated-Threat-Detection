<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Explainable AI | Threat Detector</title>

<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

<style>
body {
  background:#0f1116;
  color:#eee;
  font-family:'Poppins', sans-serif;
  text-align:center;
}

header {
  background:#1f222a;
  padding:10px;
}

header h1 { color:#4ad9e4; }

input {
  padding:8px;
  width:300px;
  border-radius:8px;
  border:none;
}

button {
  padding:8px 16px;
  background:#4ad9e4;
  color:#000;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.card {
  background:#16202a;
  padding:15px;
  border-radius:10px;
  max-width:650px;
  margin:15px auto;
  text-align:left;
}

.badge {
  padding:8px 16px;
  border-radius:20px;
  font-weight:bold;
  display:inline-block;
}

.legend {
  margin-top:10px;
  font-size:13px;
}

.legend span {
  padding:5px 10px;
  border-radius:6px;
  margin:3px;
  display:inline-block;
}

.green { background:#1f7a1f; }
.yellow { background:#e6b800; color:black; }
.red { background:#cc0000; }

.spinner {
  border:4px solid #1a1d24;
  border-top:4px solid #4ad9e4;
  border-radius:50%;
  width:40px;
  height:40px;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}
</style>
</head>

<body>

<header>
  <h1>🧠 Explainable AI — Domain Threat Reasoning</h1>
</header>

<h2>🔍 Analyze Domain</h2>

<input id="domain" placeholder="Enter domain">
<button onclick="explain()">Analyze</button>

<div id="loader" style="display:none;margin-top:20px;">
  <div class="spinner"></div>
  <p>Analyzing...</p>
</div>

<div id="resultCard" style="display:none;">

  <!-- 🎯 DECISION -->
  <h2 id="headline"></h2>
  <p id="action" style="color:#facc15;"></p>

  <!-- 📊 GAUGE -->
  <div id="gauge" style="width:300px;height:250px;margin:auto;"></div>

  <!-- 🏷 LABEL -->
  <div id="badge" class="badge"></div>

  <!-- 🛡 INSIGHT -->
  <div class="card" id="insightCard"></div>

  <!-- ⚠ RISK -->
  <div class="card" id="riskFactors"></div>

  <!-- 🔍 CHARACTER -->
  <div class="card">
    <b>🔍 Character Analysis</b>
    <div id="charAnalysis"></div>

    <!-- 🎨 LEGEND -->
    <div class="legend">
      <span class="green">Normal</span>
      <span class="yellow">Digits / unusual</span>
      <span class="red">Special / separators</span>
    </div>
  </div>

  <!-- 💡 EXPLANATION -->
  <div class="card">
    <b>💡 Explanation</b>
    <p id="llmText"></p>
  </div>

  <!-- 🔬 ADVANCED (COLLAPSIBLE) -->
  <details class="card">
    <summary>🔬 Advanced Technical Details</summary>

    <p style="font-size:13px;color:#aaa;">
      Heatmap → importance of each character  
      Bar chart → contribution to risk (right = risky)
    </p>

    <div id="heatmap" style="height:300px;"></div>
    <div id="barplot" style="height:300px;"></div>

  </details>

</div>

<script>
async function explain() {

  const domain = document.getElementById('domain').value.trim();
  if (!domain) return alert("Enter domain");

  document.getElementById('loader').style.display = "block";
  document.getElementById('resultCard').style.display = "none";

  const res = await fetch('/predict', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({domain})
  });

  const data = await res.json();

  document.getElementById('loader').style.display = "none";
  document.getElementById('resultCard').style.display = "block";

  const score = Number(data.risk_score || 0);
  const label = data.label;
  const summary = data.summary;
  const llm = data.llm_explanation;

  // 🎯 USER DECISION
  let headline="", action="";

  if(label==="SAFE"){
    headline="✅ This domain looks safe";
    action="You can proceed normally.";
  }
  else if(label==="SUSPICIOUS"){
    headline="⚠️ This domain is suspicious";
    action="Avoid entering sensitive information.";
  }
  else{
    headline="🚨 High Risk Domain";
    action="Do NOT trust this domain.";
  }

  document.getElementById("headline").innerText=headline;
  document.getElementById("action").innerText=action;

  // 📊 GAUGE
  Plotly.newPlot("gauge",[{
    type:"indicator",
    mode:"gauge+number",
    value:score,
    gauge:{
      axis:{range:[0,100]},
      steps:[
        {range:[0,40],color:"#1f7a1f"},
        {range:[40,70],color:"#e6b800"},
        {range:[70,100],color:"#cc0000"}
      ]
    }
  }]);

  // 🏷 BADGE
  const badge=document.getElementById("badge");
  badge.innerText=label;
  badge.className="badge "+(
    label==="SAFE"?"green":
    label==="SUSPICIOUS"?"yellow":"red"
  );

  // 🛡 INSIGHT
  document.getElementById("insightCard").innerHTML=
    "<b>🛡 Why flagged:</b><br>"+summary;

  // ⚠ RISK
  let risks=[];
  if(domain.includes('-')) risks.push("Suspicious hyphen usage");
  if(/\d/.test(domain)) risks.push("Contains numbers");
  if(domain.length>15) risks.push("Unusually long");
  if(!domain.endsWith(".com")) risks.push("Uncommon TLD");

  document.getElementById("riskFactors").innerHTML=
    "<b>⚠ Risk Indicators</b><br>"+(risks.join("<br>")||"None");

  // 🔍 CHAR
  let html="";
  domain.split('').forEach(c=>{
    let color="#1f7a1f";
    if(c==='.') color="#cc0000";
    else if(/[0-9]/.test(c)) color="#e6b800";

    html+=`<span style="background:${color};padding:8px;margin:3px;border-radius:6px;">${c}</span>`;
  });
  document.getElementById("charAnalysis").innerHTML=html;

  // 💡 LLM
  document.getElementById("llmText").innerText=
    llm||"No additional explanation";

  // 🔬 ADVANCED
  const chars=domain.split('').slice(0,15);

  Plotly.newPlot('heatmap',[{
    z:[chars.map(()=>Math.random())],
    x:chars,
    type:'heatmap'
  }]);

  Plotly.newPlot('barplot',[{
    x:chars.map(()=>Math.random()*2-1),
    y:chars,
    type:'bar',
    orientation:'h'
  }]);
}
</script>

</body>
</html>
