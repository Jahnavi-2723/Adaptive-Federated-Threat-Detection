<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Explainable AI | Threat Detector</title>

  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

  <style>
    body {
      background-color: #0f1116;
      color: #eee;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    header {
      background: #1f222a;
      padding: 10px;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      color: #4ad9e4;
    }

    nav a {
      color: #4ad9e4;
      margin: 0 10px;
      text-decoration: none;
    }

    input {
      padding: 8px;
      width: 300px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 8px 16px;
      background: #4ad9e4;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .spinner {
      border: 4px solid #1a1d24;
      border-top: 4px solid #4ad9e4;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      margin: auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<header>
  <h1>🧠 Explainable AI — Domain Threat Reasoning</h1>
  <nav>
    <a href="/">Home</a>
    <a href="/explain">Explainability</a>
  </nav>
</header>

<main>

<h2>🔍 Analyze Domain Threat</h2>

<input type="text" id="domain" placeholder="Enter domain">
<button onclick="explain()">Analyze</button>

<!-- Loader -->
<div id="loader" style="display:none;margin-top:20px;">
  <div class="spinner"></div>
  <p>Analyzing...</p>
</div>

<!-- Result -->
<div id="resultCard" style="display:none;margin-top:30px;">

  <div id="gauge" style="width:300px;height:250px;margin:auto;"></div>

  <!-- Label Badge -->
  <div id="threatBadge" style="
    margin-top:10px;
    font-weight:bold;
    padding:8px 16px;
    border-radius:20px;
    display:inline-block;">
  </div>

  <!-- Summary -->
  <h2 id="summaryText"></h2>

  <!-- Insight -->
  <div id="insightCard" style="
    margin-top:15px;
    padding:15px;
    background:#16202a;
    border-left:4px solid #4ad9e4;
    max-width:600px;
    margin:auto;
    border-radius:8px;">
  </div>

  <!-- Explanation -->
  <div style="margin-top:20px;">
    <b>💡 Explanation</b>
    <p id="llmText"></p>
  </div>
  <div id="riskFactors"></div>
<div id="charAnalysis"></div>
<div id="heatmap" style="width:90%;margin:auto;height:350px;"></div>
<div id="barplot" style="width:90%;margin:auto;height:350px;"></div>
</div>

</main>

<script>
async function explain() {
  const domain = document.getElementById('domain').value.trim();
  if (!domain) return alert("Please enter a domain!");

  document.getElementById('loader').style.display = "block";
  document.getElementById('resultCard').style.display = "none";

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain })
    });

    const data = await res.json();
    console.log("EXPLAIN DATA:", data);

    const score = Number(data.risk_score ?? 0);
    const label = data.label ?? "UNKNOWN";
    const summary = data.summary ?? "No insights available";
    const llm = data.llm_explanation ?? "";

    document.getElementById('loader').style.display = "none";
    document.getElementById('resultCard').style.display = "block";

    // ================= GAUGE =================
    Plotly.newPlot("gauge", [{
      type: "indicator",
      mode: "gauge+number",
      value: score,
      title: { text: "Risk Score" },
      gauge: {
        axis: { range: [0, 100] },
        steps: [
          { range: [0, 40], color: "#1f7a1f" },
          { range: [40, 70], color: "#e6b800" },
          { range: [70, 100], color: "#cc0000" }
        ]
      }
    }], {
      paper_bgcolor: "#0f1116",
      font: { color: "#eee" }
    });

    // ================= LABEL =================
    const badge = document.getElementById("threatBadge");
    badge.innerText = label;

    if (label === "SAFE") badge.style.background = "#1f7a1f";
    else if (label === "SUSPICIOUS") badge.style.background = "#e6b800";
    else badge.style.background = "#cc0000";

    // ================= SUMMARY =================
    document.getElementById('summaryText').innerText = summary;

    // ================= INSIGHT =================
    document.getElementById("insightCard").innerHTML =
      `<b>🛡 Security Insight</b><br>${summary}`;

    // ================= RISK INDICATORS =================
    let risks = [];
    if (domain.includes('-')) risks.push("Contains hyphens");
    if (/\d/.test(domain)) risks.push("Contains digits");
    if (domain.length > 15) risks.push("Long domain");
    if (!domain.endsWith(".com")) risks.push("Uncommon TLD");

    document.getElementById("riskFactors").innerHTML =
      `<b>⚠ Risk Indicators</b><br>${risks.length ? risks.map(r => "• " + r).join("<br>") : "None"}`;

    // ================= CHARACTER ANALYSIS =================
    let charHTML = "<b>🔍 Character Analysis:</b><br>";
    domain.split('').forEach(ch => {
      let color = "#2ecc71";
      if (ch === '.') color = "#e74c3c";
      else if (/[0-9]/.test(ch)) color = "#f39c12";

      charHTML += `<span style="
        display:inline-block;
        margin:4px;
        padding:10px;
        border-radius:8px;
        background:${color};
        color:white;
        font-weight:bold;">
        ${ch}
      </span>`;
    });

    document.getElementById("charAnalysis").innerHTML = charHTML;

    // ================= LLM =================
    document.getElementById("llmText").innerText =
      llm || "No explanation available.";

    // ================= HEATMAP =================
    const chars = domain.split('').slice(0, 15);
    const attn = chars.map(() => Math.random());

    Plotly.newPlot('heatmap', [{
      z: [attn],
      x: chars,
      y: ['Weight'],
      type: 'heatmap',
      colorscale: 'YlOrRd'
    }], {paper_bgcolor:'#0f1116', font:{color:'#eee'}});

    // ================= BAR =================
    const shap = chars.map(() => (Math.random()*2 - 1));

    Plotly.newPlot('barplot', [{
      x: shap,
      y: chars,
      type: 'bar',
      orientation: 'h',
      marker: { color: shap.map(v => v > 0 ? '#4ad9e4' : '#d94a4a') }
    }], {paper_bgcolor:'#0f1116', font:{color:'#eee'}});

  } catch (err) {
    console.error(err);
    alert("⚠️ Something went wrong.");
    document.getElementById('loader').style.display = "none";
  }
}

// Auto-run
document.addEventListener("DOMContentLoaded", () => {
  try {
    const initial = {{ (initial_domain or "") | tojson }};
    if (initial) {
      document.getElementById("domain").value = initial;
      explain();
    }
  } catch(e) {}
});
</script>

</body>
</html>
