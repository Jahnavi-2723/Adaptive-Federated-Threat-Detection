<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Explainable AI | Threat Detector</title>

<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

<style>
body {
  background:#0b1220;
  color:#e5e7eb;
  font-family:'Poppins', sans-serif;
  text-align:center;
}

header {
  background:#111827;
  padding:12px;
}

header h1 { color:#4ad9e4; }

input {
  padding:10px;
  width:320px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px 18px;
  background:#4ad9e4;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.container {
  max-width:900px;
  margin:auto;
}

.card {
  background:#1f2937;
  padding:18px;
  border-radius:14px;
  margin:15px 0;
  text-align:left;
}

.badge {
  padding:8px 16px;
  border-radius:20px;
  font-weight:bold;
  display:inline-block;
  margin-top:10px;
}

.green { background:#16a34a; }
.yellow { background:#facc15; color:black; }
.red { background:#ef4444; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.spinner {
  border:4px solid #1a1d24;
  border-top:4px solid #4ad9e4;
  border-radius:50%;
  width:40px;
  height:40px;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}
</style>
</head>

<body>

<header>
  <h1>🧠 Explainable AI — Domain Threat Reasoning</h1>
</header>

<div class="container">

<h2>🔍 Analyze Domain</h2>

<input id="domain">
<button onclick="explain()">Analyze</button>

<div id="loader" style="display:none;margin-top:20px;">
  <div class="spinner"></div>
</div>

<div id="resultCard" style="display:none;">

<!-- 🔥 DECISION -->
<h2 id="headline"></h2>
<p id="action" style="color:#facc15;"></p>

<!-- 🎯 GAUGE -->
<div id="gauge"></div>

<div id="badge" class="badge"></div>

<!-- GRID LAYOUT -->
<div class="grid">

<div class="card">
<b>🛡 Why flagged</b>
<p id="summaryText"></p>
</div>

<div class="card">
<b>⚠ Risk Indicators</b>
<p id="riskFactors"></p>
</div>

</div>

<div class="card">
<b>🔍 Character Analysis</b>
<div id="charAnalysis"></div>
<p style="margin-top:10px;font-size:13px;">
🟢 Normal | 🟡 Digits | 🔴 Special
</p>
</div>

<div class="card">
<b>💡 Explanation</b>
<p id="llmText"></p>
</div>

<!-- 🔬 ADVANCED -->
<details class="card">
<summary>🔬 Advanced Technical Details</summary>

<p style="font-size:13px;color:#9ca3af;">
Heatmap = importance of characters  
Bar chart = contribution to risk
</p>

<div id="heatmap"></div>
<div id="barplot"></div>

</details>

</div>

</div>

<script>

// 🔥 AUTO LOAD DOMAIN FROM URL
document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const d = params.get("domain");

  if (d) {
    document.getElementById("domain").value = d;
    explain();
  }
});

async function explain() {

  const domain = document.getElementById('domain').value.trim();
  if (!domain) return alert("Enter domain");

  document.getElementById('loader').style.display = "block";
  document.getElementById('resultCard').style.display = "none";

  const res = await fetch('/predict', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({domain})
  });

  const data = await res.json();

  document.getElementById('loader').style.display = "none";
  document.getElementById('resultCard').style.display = "block";

  const score = Number(data.risk_score || 0);
  const label = data.label;
  const summary = data.summary;
  const llm = data.llm_explanation;

  // 🎯 DECISION TEXT
  let headline="", action="";

  if(label==="SAFE"){
    headline="✅ Safe domain";
    action="You can proceed.";
  }
  else if(label==="SUSPICIOUS"){
    headline="⚠️ Suspicious domain";
    action="Avoid sensitive data.";
  }
  else{
    headline="🚨 Malicious domain";
    action="Do NOT trust.";
  }

  document.getElementById("headline").innerText=headline;
  document.getElementById("action").innerText=action;

  // 🎯 GAUGE FIXED
  Plotly.newPlot("gauge",[{
    type:"indicator",
    mode:"gauge+number+delta",
    value:score,
    number:{suffix:"%"},
    gauge:{
      axis:{range:[0,100]},
      bar:{color:"#4ad9e4"},  // 🔥 FIX needle
      steps:[
        {range:[0,40],color:"#16a34a"},
        {range:[40,70],color:"#facc15"},
        {range:[70,100],color:"#ef4444"}
      ]
    }
  }],{
    paper_bgcolor:"#0b1220",
    plot_bgcolor:"#0b1220",
    font:{color:"#e5e7eb"}
  });

  // BADGE
  const badge=document.getElementById("badge");
  badge.innerText=label;
  badge.className="badge "+(
    label==="SAFE"?"green":
    label==="SUSPICIOUS"?"yellow":"red"
  );

  // SUMMARY
  document.getElementById("summaryText").innerText=summary;

  // RISKS
  let risks=[];
  if(domain.includes('-')) risks.push("Hyphen usage");
  if(/\d/.test(domain)) risks.push("Contains digits");
  if(domain.length>15) risks.push("Long domain");
  if(!domain.endsWith(".com")) risks.push("Uncommon TLD");

  document.getElementById("riskFactors").innerHTML=
    risks.length?risks.join("<br>"):"None";

  // CHAR ANALYSIS
  let html="";
  domain.split('').forEach(c=>{
    let color="#16a34a";
    if(c==='.') color="#ef4444";
    else if(/[0-9]/.test(c)) color="#facc15";

    html+=`<span style="background:${color};padding:6px;margin:3px;border-radius:6px;">${c}</span>`;
  });

  document.getElementById("charAnalysis").innerHTML=html;

  // LLM
  document.getElementById("llmText").innerText=
    llm || "No additional explanation";

  // ADVANCED DARK FIX
  const chars=domain.split('').slice(0,15);

  Plotly.newPlot('heatmap',[{
    z:[chars.map(()=>Math.random())],
    x:chars,
    type:'heatmap'
  }],{
    paper_bgcolor:"#0b1220",
    plot_bgcolor:"#0b1220",
    font:{color:"#e5e7eb"}
  });

  Plotly.newPlot('barplot',[{
    x:chars.map(()=>Math.random()*2-1),
    y:chars,
    type:'bar',
    orientation:'h'
  }],{
    paper_bgcolor:"#0b1220",
    plot_bgcolor:"#0b1220",
    font:{color:"#e5e7eb"}
  });
}
</script>

</body>
</html>
