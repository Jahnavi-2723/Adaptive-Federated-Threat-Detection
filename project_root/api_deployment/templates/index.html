<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adaptive Federated Threat Detection</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

<style>
body { background:#0f172a; color:#e2e8f0; }

header {
  background:#1f222a;
  padding:12px;
  text-align:center;
}
header h1 { color:#4ad9e4; }

.main-container {
  width: 100%;
  padding: 20px 40px;
}

.section { margin-top:50px; }

.section-title {
  text-align:center;
  color:#4ad9e4;
  margin-bottom:20px;
}
.llm-note {
  background: linear-gradient(135deg, rgba(74,217,228,0.1), rgba(74,217,228,0.03));
  padding: 12px;
  border-radius: 12px;
  border-left: 4px solid #4ad9e4;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
/* RESULT CARD */
.result-card {
  max-width:600px;
  margin:20px auto;
  background: rgba(31,41,55,0.6);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:16px;
  text-align:center;
}

/* INSPECT CARD */
.card-premium {
  background: rgba(31,41,55,0.6);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:25px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.inspect-card {
  margin-top:30px;
  text-align:center;
}

/* BADGE */
.badge-premium {
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
  font-weight:600;
  display:inline-block;
  margin-top:10px;
  color:#000;
}

/* TABLE */
.table-wrapper {
  width: 100%;
  padding: 0 10px;
}

/* CHART BOX */
.chart-box {
  background:#1f2937;
  padding:15px;
  border-radius:12px;
}
</style>
</head>

<body>

<header>
  <h1>🛡 Adaptive Federated Threat Detection</h1>
</header>

<div class="main-container">

<!-- ================= SCAN ================= -->
<div class="section text-center">
  <h3 class="section-title">🔍 Check a Domain</h3>

  <input id="domain" class="form-control w-50 mx-auto mb-3" placeholder="Enter domain">

  <div class="mb-2">
    <button class="btn btn-info" onclick="predict()">Scan</button>
    <button class="btn btn-warning" onclick="inspectDomain()">Inspect</button>
    <button class="btn btn-success" onclick="window.location.href='/explain?domain=' + document.getElementById('domain').value">Full Analysis</button>
  </div>

  <div id="result"></div>
</div>

<!-- ================= INSPECT ================= -->
<div id="inspectPanel" class="inspect-card card-premium" style="display:none; max-width:500px; margin:auto;">

  <div id="miniGauge" style="height:220px;"></div>

  <div id="miniBadge" class="badge-premium"></div>

  <h5 id="miniSummary" style="color:#4ad9e4; margin-top:10px;"></h5>

</div>

<!-- ================= HISTORY ================= -->
<div class="section">
  <h4 class="section-title">📜 Recent Scans</h4>

  <div class="table-wrapper">
    <table class="table table-dark table-striped text-center">
      <thead>
        <tr>
          <th>Time</th>
          <th>Domain</th>
          <th>Score</th>
          <th>Label</th>
          <th>Inspect</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>
</div>

<!-- ================= ANALYTICS ================= -->
<div class="section">
  <h4 class="section-title">📊 Model Analytics</h4>
<div class="row g-3 mb-4" id="metric-cards">

  <div class="col-md-2">
    <div class="chart-box text-center">
      <h6>Accuracy</h6>
      <h4 id="m-acc">--</h4>
    </div>
  </div>

  <div class="col-md-2">
    <div class="chart-box text-center">
      <h6>Precision</h6>
      <h4 id="m-prec">--</h4>
    </div>
  </div>

  <div class="col-md-2">
    <div class="chart-box text-center">
      <h6>Recall</h6>
      <h4 id="m-rec">--</h4>
    </div>
  </div>

  <div class="col-md-2">
    <div class="chart-box text-center">
      <h6>F1-Score</h6>
      <h4 id="m-f1">--</h4>
    </div>
  </div>

  <div class="col-md-2">
    <div class="chart-box text-center">
      <h6>ROC-AUC</h6>
      <h4 id="m-roc">--</h4>
    </div>
  </div>

</div>
  <div class="row g-3">
    <div class="col-md-6">
      <div class="chart-box">
        <canvas id="accChart"></canvas>
      </div>
    </div>

    <div class="col-md-6">
      <div class="chart-box">
        <canvas id="lossChart"></canvas>
      </div>
    </div>

    <div class="col-md-6">
      <div class="chart-box">
        <canvas id="cmChart"></canvas>
      </div>
    </div>

    <div class="col-md-6">
      <div class="chart-box">
        <canvas id="cmpChart"></canvas>
      </div>
    </div>
  </div>
</div>

</div>

<!-- ✅ ONLY THIS SCRIPT (NO INLINE JS) -->
<script src="{{ url_for('static', filename='js/analytics.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
